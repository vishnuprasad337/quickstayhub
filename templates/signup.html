<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .signup-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 { color: #1e3c72; text-align: center; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Prevents input from overflowing */
        }
        button {
            width: 100%;
            padding: 12px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background: #2a5298; }
        .error-list {
            color: #d9534f;
            background: #f2dede;
            padding: 10px;
            border-radius: 5px;
            list-style: none;
            font-size: 14px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="signup-container">
    <h2>Sign Up</h2>

    {% if messages %}
        <ul class="error-list">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="user_name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="text" name="address" placeholder="Residential Address" required>
        <input type="text" name="phonenumber" placeholder="Phone Number" required>
        <input type="password" name="password" placeholder="Create Password" required>
        
        <button type="submit">Register</button>
    </form>

    <p style="text-align: center; font-size: 14px; margin-top: 15px;">
        Already have an account? <a href="{% url 'user' %}" style="color: #1e3c72;">Login</a>
    </p>
</div>

</body>
</html>
