<!DOCTYPE html>
<html>
<head>
    <title>Hotel Rooms</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
        }

        .room-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 30px auto;
        }

        .room-card {
            position: relative;
            background: white;
            border-radius: 12px;
            border-top: 5px solid #1e3c72;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            
            justify-content: space-between; 
        }

        .room-id {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 0.8rem;
            color: #1e3c72;
            background: #eef2f7;
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: bold;
        }

        .room-type {
            font-size: 1.25rem;
            color: #333;
            margin: 10px 0 5px 0;
            font-weight: bold;
        }

        .price-tag {
            color: #27ae60;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 1px solid #eee;
            padding: 10px 0;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
        }

        .value {
            font-weight: bold;
            color: #1e3c72;
        }

        /* Booking Button Style */
        .book-btn {
            background-color: #1e3c72;
            color: white;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .book-btn:hover {
            background-color: #2a5298;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">🏨 Rooms - {{ hotel.name }}</h2>

<div class="room-container">
    {% for room in rooms %}
    <div class="room-card">
        <div>
            <span class="room-id">ID: {{ room.id }}</span>
            <div class="room-type">{{ room.room_type }}</div>
            <div class="price-tag">₹{{ room.price }}</div>

            <div class="stats-grid">
                <div class="stat-box">
                    <span class="label">Available</span>
                    <span class="value">{{ room.available_rooms }}</span>
                </div>
                <div class="stat-box">
                    <span class="label">Total</span>
                    <span class="value">{{ room.total_rooms }}</span>
                </div>
            </div>
        </div>
        
     <a href="{% url 'process_booking' room.id %}" class="book-btn">Book Now</a>
    </div>
    {% empty %}
    <p style="text-align:center; width: 100%;">No Rooms Available</p>
    {% endfor %}
</div>

<div style="text-align:center; margin-top: 20px;">
    <a href="{% url 'hotel_list' %}" style="color: #1e3c72; text-decoration: none; font-weight: bold;">⬅ Back to Hotels</a>
</div>

</body>
</html>
