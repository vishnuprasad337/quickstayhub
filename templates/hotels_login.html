<!DOCTYPE html>
<html>
<head>
    <title>Hotel Login</title>
    <style>
        body {
            font-family: Arial;
        }
        .login-box {
            width: 350px;
            margin: 80px auto;
            padding: 20px;
            border: 1px solid #ccc;
            text-align: center;
        }
        h2 {
            color: #371e72;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            padding: 8px 15px;
            background-color: #1e3c72;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #16325c;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🏨 Hotel Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <input type="text" name="name" placeholder="Hotel Name" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        
        <button type="submit">Login</button>
    </form>

    <br>
    <a href="{% url 'hotel' %}">⬅ Back</a>
</div>

</body>
</html>
