<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Platform</title>

    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            display: flex;
            justify-content: center; /* Centered since there are no right-side links */
            align-items: center;
            padding: 20px 60px;
            color: white;
        }

        /* If you want to keep the logo on the left, use justify-content: space-between above */
        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            width: 420px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card h1 {
            margin-bottom: 30px;
            color: #1e3c72;
        }

        .card a {
            display: block;
            margin: 15px 0;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            background: #f0f4ff;
            color: #1e3c72;
            transition: 0.3s ease;
        }

        .card a:hover {
            background: #1e3c72;
            color: white;
            transform: scale(1.05);
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: white;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">🏨 Booking Platform</div>
    </div>

    <div class="hero">
        <div class="card">
            <h1>Welcome to Booking System</h1>

            <a href="{% url 'user' %}">👤 User Login</a>
            <a href="{% url 'hotel' %}">🏨 Manage Hotels</a>
            <a href="{% url 'signup' %}">📅 Sign Up</a>
        </div>
    </div>

    <div class="footer">
        © 2026 Booking System | Developed by You 🚀
    </div>

</body>
</html>
